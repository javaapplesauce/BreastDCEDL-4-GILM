# paths
[paths]


# Pre-trained weights
weights_path        = BreastDCEDL_models/breastdcedl_pcr_vit_model_weights.pth
checkpoint_dir      = checkpoints

# data
[data]
# Metadata CSVs – one per dataset; they are merged at runtime
spy1_metadata_csv   = BreastDCEDL_spy1/BreastDCEDL_spy1_metadata.csv
duke_metadata_csv   = BreastDCEDL_duke/BreastDCEDL_duke_metadata.csv

# NIfTI DCE acquisition roots (one folder per dataset key)
nifti_spy1          = BreastDCEDL_spy1/spt1_dce
nifti_spy2          = ISPY2/data_samples/dce
nifti_duke          = BreastDCEDL_duke/duke_dce

# Mask roots
mask_spy1           = BreastDCEDL_spy1/spy1_mask
mask_spy2           = ISPY2/data_samples/mask
mask_duke           = BreastDCEDL_duke/duke_mask

label_col           = pCR
crop_size           = 224
n_slices_per_patient = 4

[model]
# Switch from facebook/vit-mae-base (MAE self-supervised) to
# google/vit-base-patch16-224-in21k (supervised ImageNet-21k classification).
#
# Why this matters:
#   MAE pre-training optimises for patch reconstruction, producing spatially
#   rich but semantically disorganised features. The [CLS] token — which is
#   what the classifier head reads — is essentially unused during MAE training.
#   ImageNet-21k supervised pre-training directly optimises the [CLS] token
#   for discrimination, making it vastly better as a starting point for a
#   binary medical classification task.
#
#   The .pth weights (breastdcedl_pcr_vit_model_weights.pth) were originally
#   fine-tuned FROM a supervised ViT, so the encoder layers will still load
#   with only classifier.weight/bias MISSING (same as before).
hf_checkpoint       = google/vit-base-patch16-224-in21k
num_classes         = 2

[training]
# Diagnosis of all four runs
#
# Run 1 (MAE,  lr=1e-5,  unfrozen): best val acc=0.711 @ ep8  → overfit ep9+
# Run 2 (MAE,  lr=3e-6,  frozen):   flat — frozen MAE [CLS] can't transfer
# Run 3 (MAE,  lr=5e-6,  unfrozen): label_smoothing inflated loss; acc=0.544
# Run 4 (IN21k,lr=8e-6,  unfrozen): best val acc=0.700 @ ep3  → overfit ep4+

num_epochs          = 15
physical_batch_size = 8
accum_steps         = 4
lr                  = 4e-6
weight_decay        = 5e-3
num_workers         = 4
freeze_backbone     = false
